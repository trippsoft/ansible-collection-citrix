---
dependency:
  name: galaxy
driver:
  name: vagrant
  provider:
    name: libvirt
  cachier: machine
  parallel: true
platforms:
  - name: win
    box: jtarpley/${MOLECULE_BOX:-w2025_cis}
    memory: 8192
    cpus: 2
    provider_options:
      default_prefix: citrix_pvs_target_
    groups:
      - subjects
      - windows
provisioner:
  name: ansible
  inventory:
    group_vars:
      subjects:
        _ctxpvs_version: ${MOLECULE_CITRIX_PVS_VERSION:-2511}
        _ctxpvs_target_installer_source: "../../../../files/pvs_target/{{ _ctxpvs_version }}/PVS_Device_x64.exe"
        choco_configure_testing_repo: ${MOLECULE_CONFIGURE_TESTING_REPO:-true}
        choco_testing_repo_name: Testing
        choco_testing_repo_url: ${MOLECULE_TESTING_REPO_URL:-http://192.168.81.5:8081/repository/chocolatey-proxy/}
        ctxpvs_target_installer_path: C:\Windows\Temp\PVS_Device_x64.exe
      windows:
        ansible_shell_type: powershell
        ansible_become_method: runas
        ansible_become_user: SYSTEM
        ansible_password: vagrant
    host_vars:
      win:
        ansible_ssh_common_args: '-o PreferredAuthentications=password -o PubkeyAuthentication=no -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPersist=60s -o ForwardX11=no -o LogLevel=ERROR -o StrictHostKeyChecking=no'
verifier:
  name: ansible
